name: discover
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    env:
      AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
      AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      FLUX_API_KEY: ${{ secrets.FLUX_API_KEY }}
      HIGGSFIELD_API_KEY: ${{ secrets.HIGGSFIELD_API_KEY }}
      CANVA_API_KEY: ${{ secrets.CANVA_API_KEY }}
      HEYGEN_API_KEY: ${{ secrets.HEYGEN_API_KEY }}
      ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
      DRY_RUN: ${{ vars.DRY_RUN || 'true' }}
      DAILY_USD_BUDGET: ${{ vars.DAILY_USD_BUDGET || '5' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python -m scripts.run_stage discover
